server {                                                                                                                                                            
    listen 80;                                                                                                                                                      
    server_name shop.axda-studio.fr;                                                                                                                             

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;                                                                                                                                
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                    
    }                                                                                                                                                               
}                                                                                                                                                                                                                                                                                                                                      
server {                                                                                                                                                         
    listen 80;
    server_name cms.axda-studio.fr;
                                                                                                                                                                    
    location / {                                                                                                                                                    
        proxy_pass http://backend:1337;                                                                                                                             
        proxy_set_header Host $host;                                                                                                                                
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                    
    }                                                                                                                                                            
}
