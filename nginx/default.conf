server {                                                                                                                                                            
    listen 80;                                                                                                                                                      
    server_name shop.axda-studio.fr cms.axda-studio.fr shop-staging.axda-studio.fr cms-staging.axda-studio.fr;                                                                                                             
                                                                                                                                                                    
    location /.well-known/acme-challenge/ {                                                                                                                         
        root /var/www/certbot;                                                                                                                                   
    }                                                                                                                                                               
                                                                                                                                                                    
    location / {                                                                                                                                                    
        return 301 https://$host$request_uri;                                                                                                                       
    }                                                                                                                                                               
}                                                                                                                                                                

server {
    listen 443 ssl;
    server_name shop.axda-studio.fr;                                                                                                                                
                                                                                                                                                                    
    ssl_certificate /etc/letsencrypt/live/shop.axda-studio.fr/fullchain.pem;                                                                                        
    ssl_certificate_key /etc/letsencrypt/live/shop.axda-studio.fr/privkey.pem;                                                                                      
                                                                                                                                                                    
    location / {                                                                                                                                                    
        proxy_pass http://frontend:3000;                                                                                                                            
        proxy_set_header Host $host;                                                                                                                                
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                    
    }                                                                                                                                                               
}
                                                                                                                                                                                                                                                                                                
server {                                                                                                                                                            
    listen 443 ssl;                                                                                                                                                 
    server_name cms.axda-studio.fr;                                                                                                                              

    ssl_certificate /etc/letsencrypt/live/shop.axda-studio.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.axda-studio.fr/privkey.pem;                                                                                      
                                                                                                                                                                    
    location / {                                                                                                                                                    
        proxy_pass http://backend:1337;                                                                                                                             
        proxy_set_header Host $host;                                                                                                                                
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                    
    }                                                                                                                                                               
}

server {                                                                                                                                                            
    listen 443 ssl;                                                                                                                                                 
    server_name shop-staging.axda-studio.fr;                                                                                                                             
                                                                                                                                                                    
    ssl_certificate /etc/letsencrypt/live/shop.axda-studio.fr/fullchain.pem;                                                                                        
    ssl_certificate_key /etc/letsencrypt/live/shop.axda-studio.fr/privkey.pem;                                                                                      
                                                                                                                                                                    
    location / {                                                                                                                                                    
        proxy_pass http://frontend-staging:3000;                                                                                                                    
        proxy_set_header Host $host;                                                                                                                                
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                    
    }                                                                                                                                                               
}                                                                                                                                                                   
                                                                                                                                                                    
server {                                                                                                                                                            
    listen 443 ssl;                                                                                                                                                 
    server_name cms-staging.axda-studio.fr;                                                                                                                      

    ssl_certificate /etc/letsencrypt/live/shop.axda-studio.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.axda-studio.fr/privkey.pem;                                                                                      
                                                                                                                                                                    
    location / {                                                                                                                                                    
        proxy_pass http://backend-staging:1337;                                                                                                                     
        proxy_set_header Host $host;                                                                                                                                
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                    
    }                                                                                                                                                               
}